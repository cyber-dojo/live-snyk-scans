name: Live Snyk Test

on:
  #workflow_dispatch:
  push:
  #schedule: # At 08:00 every day
  #  - cron: '0 8 * * *'

env:
  KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
  KOSLI_DEBUG:     ${{ vars.KOSLI_DEBUG }}          # true/false
  KOSLI_DRY_RUN:   ${{ vars.KOSLI_DRY_RUN }}        # true/false
  KOSLI_HOST:      ${{ vars.KOSLI_HOST }}           # https://app.kosli.com
  KOSLI_ORG:       ${{ vars.KOSLI_ORG }}            # cyber-dojo

jobs:
  setup:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      kosli_trail: ${{ steps.set-kosli-trail.outputs.kosli_trail }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create single-snyk-vulnerability custom attestation type
        run:
          kosli create attestation-type single-snyk-vuln
            --schema=single-snyk-vuln.schema.json

      - name: Output kosli-trail
        id: set-kosli-trail
        run:
          echo "kosli_trail=$(date +%Y-%m-%dT%H.%M.%S)" >> ${GITHUB_OUTPUT}


  aws-beta-snyk-scan:
    needs: [setup]
    uses: ./.github/workflows/snyk_env_test.yml
    with:
      kosli_env:   aws-beta
      kosli_trail: ${{ needs.setup.outputs.kosli_trail }}
    secrets:
      snyk_token:      ${{ secrets.SNYK_TOKEN }}
      kosli_api_token: ${{ secrets.KOSLI_API_TOKEN }}


  aws-beta-trail-names:
    needs: [aws-beta-snyk-scan]
    runs-on: ubuntu-latest
    outputs:
      current_trail:  ${{ steps.set-trail-names.outputs.current_trail }}
      previous_trail: ${{ steps.set-trail-names.outputs.previous_trail }}
    steps:
      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Find most recent Trails in Flow aws-beta-all-snyk-vulns
        id: set-trail-names
        env:
          KOSLI_FLOW:    aws-beta-all-snyk-vulns-TEST
          JSON_FILENAME: trail.json
        run: |
          # NOTE: On the first run, .data[1].name will be null, which is not
          # the name of a trail, so dependent jobs will fail, which is ok
          kosli list trails --output=json > ${JSON_FILENAME}
           current_trail="$(jq --raw-output '.data[0].name' ${JSON_FILENAME})"
          previous_trail="$(jq --raw-output '.data[1].name' ${JSON_FILENAME})"
          echo  current_trail="${current_trail}" >> ${GITHUB_OUTPUT}
          echo previous_trail="${previous_trail}" >> ${GITHUB_OUTPUT}


  aws-beta-new-snyk-vulns:
    needs: [aws-beta-trail-names]
    runs-on: ubuntu-latest
    env:
      CURRENT_TRAIL:  ${{ needs.aws-beta-trail-names.outputs.current_trail }}
      PREVIOUS_TRAIL: ${{ needs.aws-beta-trail-names.outputs.previous_trail }}
    steps:
      - name: Find new vulns by comparing previous_trail and current_trail
        run: |
          echo "CURRENT_TRAIL=:${CURRENT_TRAIL}:"
          echo "PREVIOUS_TRAIL=:${PREVIOUS_TRAIL}:"
          echo TODO


