name: Check Expiry and Notify

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      kosli_env:
        required: true
        type: string
    secrets:
      KOSLI_API_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
  push:
    branches: [main]
    paths:
      - snyk-vuln-compliance.rego
      - rego.params.aws-beta.json
      - rego.params.aws-prod.json

env:
  KOSLI_HOST:      ${{vars.KOSLI_HOST}}
  KOSLI_ORG:       ${{vars.KOSLI_ORG}}
  KOSLI_API_TOKEN: ${{secrets.KOSLI_API_TOKEN}}
  WARNING_DAYS:    7
  GITHUB_RUN_URL:       https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
  RESPONSE_GUIDE_URL:   https://github.com/${{github.repository}}/blob/main/docs/expiry-response.md

jobs:
  check-expiry:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ github.event_name == 'workflow_call' && fromJson(format('["{0}"]', inputs.kosli_env)) || fromJson('["aws-beta","aws-prod"]') }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{vars.KOSLI_CLI_VERSION}}

      - name: Find expiring vulns
        run: |
          RESULT=$(./bin/find_expiring_vulns.py \
            --warning-days ${WARNING_DAYS} \
            --envs ${{ matrix.env }})
          {
            echo "EXPIRING_VULNS<<EOF"
            echo "${RESULT}" | jq --compact-output '.expiring'
            echo "EOF"
            echo "NEXT_UP_JSON<<EOF"
            echo "${RESULT}" | jq --compact-output '.next_up'
            echo "EOF"
            echo "NEXT_UP_LINE<<EOF"
            echo "${RESULT}" | jq --raw-output 'if .next_up == null then "No Snyk vulnerabilities at all!" else "Next expiry: \(.next_up.full_id) on \(.next_up.artifact) in \(.next_up.days_remaining | round) days (\(if .next_up.mechanism == "rego_limit" then "rego" else ".snyk" end))" end'
            echo "EOF"
          } >> ${GITHUB_ENV}

      - name: Send Slack -- all clear
        if: env.EXPIRING_VULNS == '[]'
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "${{ matrix.env }}: No Snyk vulnerabilities approaching expiry :-)\n${NEXT_UP_LINE}"

      - name: Send Slack -- vulns expiring soon
        if: env.EXPIRING_VULNS != '[]'
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "${{ matrix.env }}: Snyk vulnerabilities approaching expiry.\nSee ${GITHUB_RUN_URL}\nResponse guide: ${RESPONSE_GUIDE_URL}"

      - name: Send Slack -- workflow failure
        if: failure()
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "Snyk: check-expiry-and-notify workflow FAILED.\nSee ${GITHUB_RUN_URL}"

      - name: Write GitHub step summary
        run: |
          ./bin/print_expiring_vulns_summary.py \
            --env     "${{ matrix.env }}" \
            --vulns   "${EXPIRING_VULNS}" \
            --next-up "${NEXT_UP_JSON}" \
            >> "${GITHUB_STEP_SUMMARY}"
