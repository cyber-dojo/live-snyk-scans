name: Check Expiry and Notify

on:
  workflow_call:
    inputs:
      kosli_env:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

env:
  GITHUB_RUN_URL:       https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
  RESPONSE_GUIDE_URL:   https://github.com/${{github.repository}}/blob/main/docs/expiry-response.md

jobs:
  check-expiry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download vuln files from this run
        uses: actions/download-artifact@v8
        with:
          pattern: vuln-*.json
          merge-multiple: true
          path: vulns

      - name: Find vulns
        run: |
          RESULT=$(./bin/find_expiring_vulns.py \
            --env ${{ inputs.kosli_env }} \
            --vuln-dir vulns)
          {
            echo "VULNS_JSON<<EOF"
            echo "${RESULT}" | jq --compact-output '.vulns'
            echo "EOF"
            echo "SLACK_MESSAGE<<EOF"
            echo "${RESULT}" | jq --raw-output '
              if (.vulns | length) == 0
              then "No Snyk vulnerabilities :-)"
              else
                .vulns[0] as $v |
                ($v.days_remaining | ceil) as $d |
                (if $d == 1 then "day" else "days" end) as $days |
                (if $v.mechanism == "rego_limit" then "rego" else ".snyk" end) as $mech |
                "Next: \($v.full_id) (\($v.severity)) on \($v.artifact) will cause non-compliance in \($d) \($days) (\($mech))"
              end'
            echo "EOF"
          } >> ${GITHUB_ENV}

      - name: Send Slack
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "${{ inputs.kosli_env }}: ${SLACK_MESSAGE}\nSee ${GITHUB_RUN_URL}\nResponse guide: ${RESPONSE_GUIDE_URL}"

      - name: Send Slack -- workflow failure
        if: failure()
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "Snyk: check-expiry-and-notify workflow FAILED.\nSee ${GITHUB_RUN_URL}"

      - name: Write GitHub step summary
        run: |
          ./bin/print_expiring_vulns_summary.py \
            --env   "${{ inputs.kosli_env }}" \
            --vulns "${VULNS_JSON}" \
            >> "${GITHUB_STEP_SUMMARY}"
