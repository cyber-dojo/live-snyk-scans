name: Check Expiry and Notify

on:
  workflow_dispatch:
    inputs:
      kosli_env:
        required: true
        type: choice
        options:
          - aws-beta
          - aws-prod
  workflow_call:
    inputs:
      kosli_env:
        required: true
        type: string
    secrets:
      KOSLI_API_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

env:
  KOSLI_HOST:           ${{vars.KOSLI_HOST}}
  KOSLI_ORG:            ${{vars.KOSLI_ORG}}
  KOSLI_API_TOKEN:      ${{secrets.KOSLI_API_TOKEN}}
  GITHUB_RUN_URL:       https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
  RESPONSE_GUIDE_URL:   https://github.com/${{github.repository}}/blob/main/docs/expiry-response.md

jobs:
  check-expiry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{vars.KOSLI_CLI_VERSION}}

      - name: Find vulns
        run: |
          RESULT=$(./bin/find_expiring_vulns.py \
            --envs ${{ inputs.kosli_env }})
          {
            echo "VULNS_JSON<<EOF"
            echo "${RESULT}" | jq --compact-output '.vulns'
            echo "EOF"
            echo "SLACK_MESSAGE<<EOF"
            echo "${RESULT}" | jq --raw-output '
              if (.vulns | length) == 0
              then "No Snyk vulnerabilities :-)"
              else
                .vulns[0] as $v |
                ($v.days_remaining | ceil) as $d |
                "Next: \($v.full_id) (\($v.severity)) on \($v.artifact) will cause non-compliance in \($d) \(if $d == 1 then "day" else "days" end) (\(if $v.mechanism == "rego_limit" then "rego" else ".snyk" end))\nResponse guide: \(env.RESPONSE_GUIDE_URL)"
              end'
            echo "EOF"
          } >> ${GITHUB_ENV}

      - name: Send Slack
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "${{ inputs.kosli_env }}: ${SLACK_MESSAGE}\nSee ${GITHUB_RUN_URL}"

      - name: Send Slack -- workflow failure
        if: failure()
        uses: ./.github/actions/send-slack-message
        with:
          slack_url: ${{secrets.SLACK_WEBHOOK_URL}}
          message: "Snyk: check-expiry-and-notify workflow FAILED.\nSee ${GITHUB_RUN_URL}"

      - name: Write GitHub step summary
        run: |
          ./bin/print_expiring_vulns_summary.py \
            --env   "${{ inputs.kosli_env }}" \
            --vulns "${VULNS_JSON}" \
            >> "${GITHUB_STEP_SUMMARY}"
