name: Artifact Snyk Test

on:
  workflow_call:
    secrets:
      snyk_token:
        required: true
      kosli_api_token:
        required: true

    inputs:
      artifact_name:
        description: "Artifact name"
        required: true
        type: string
      artifact_fingerprint:
        description: "Artifact fingerprint/digest (64 chars)"
        required: true
        type: string
      repo_name:
        description: "Artifact repo"
        required: true
        type: string
      git_commit:
        description: "Artifact commit (40 chars)"
        required: true
        type: string
      commit_url:
        description: "Artifact commit URL"
        required: true
        type: string
      raw_snyk_policy_url:
        description: "URL of snyk policy file (in commit for artifact)"
        required: true
        type: string
      kosli_env:
        description: "Name of Kosli environment the artifact is running in"
        required: true
        type: string
      kosli_flow:
        description: "Name of Kosli flow to attest evidence in"
        required: true
        type: string
      kosli_trail:
        description: "Name of Kosli trail to attest evidence in"
        required: true
        type: string
      kosli_cat:
        description: "Name of custom attestion type"
        required: true
        type: string

env:
  KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
  KOSLI_DEBUG:     ${{ vars.KOSLI_DEBUG }}          # true/false
  KOSLI_DRY_RUN:   ${{ vars.KOSLI_DRY_RUN }}        # true/false
  KOSLI_HOST:      ${{ vars.KOSLI_HOST }}           # https://app.kosli.com
  KOSLI_ORG:       ${{ vars.KOSLI_ORG }}            # cyber-dojo


jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      trail_created_at: ${{ steps.set-trail-created-at.outputs.trail_created_at }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create Kosli flow
        run:
          kosli create flow "${{ inputs.kosli_flow }}"
            --description "Holds snyk vulnerability, severities, ages, and policies for Artifacts destined for, or running in, the '${{ inputs.kosli_env }}' Environment"
            --use-empty-template

      - name: Begin Kosli trail (idempotent)
        run:
          kosli begin trail "${{ inputs.kosli_trail }}"
            --flow "${{ inputs.kosli_flow }}"

      - name: Get trail info
        run:
          kosli get trail "${{ inputs.kosli_trail }}"
            --flow "${{ inputs.kosli_flow }}"
            --output json > trail.json

      - name: Extra trail creation date
        id: set-trail-created-at
        run: |
          trail_created_at="$(jq .created_at trail.json)"
          echo "trail_created_at=${trail_created_at}" >> ${GITHUB_OUTPUT}


  find-snyk-vulns:
    runs-on: ubuntu-latest
    outputs:
      vulns: ${{ steps.set-vulns.outputs.vulns }}
    permissions:
      id-token: write
      contents: write
    env:
      SNYK_SARIF_FILENAME: snyk.container.test.json
      SNYK_POLICY_FILENAME: .snyk
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load docker image from registry
        uses: cyber-dojo/load-image-from-registry@main
        with:
          image_name: "${{ inputs.artifact_name }}"
          aws_rolename: "gh_actions_live_snyk_scans"

      - name: Setup Snyk
        uses: snyk/actions/setup@master
        with:
          snyk-version: v1.1300.2

      - name: Fail if the sarif file already exists
        run: |
          if test -f "${SNYK_SARIF_FILENAME}" ; then
            echo "ERROR: ${SNYK_SARIF_FILENAME} already exists"
            exit 42
          fi

      - name: Set empty .snyk policy file
        run:
          echo > "${SNYK_POLICY_FILENAME}"

      - name: Run Snyk container test
        env:
          SNYK_TOKEN: ${{ secrets.snyk_token }}
        run:
          snyk container test "${{ inputs.artifact_name }}"
            --policy-path="${SNYK_POLICY_FILENAME}"
            --sarif
            --sarif-file-output="${SNYK_SARIF_FILENAME}" || true

      - name: Fail if the sarif file is not created
        run: |
          if ! test -f "${SNYK_SARIF_FILENAME}" ; then
            echo "ERROR: ${SNYK_SARIF_FILENAME} was not created"
            exit 43
          fi

      - name: Get the real .snyk file
        run: |
          curl "${{ inputs.raw_snyk_policy_url }}" > "${SNYK_POLICY_FILENAME}"
          cat "${SNYK_POLICY_FILENAME}"

      - name: Combine vulns in sarif and snyk policy file info
        id: set-vulns
        env:
          JSON_FILENAME: vulns.json
        run: |
          ./bin/combine_snyk.py "${SNYK_SARIF_FILENAME}" "${SNYK_POLICY_FILENAME}" > "${JSON_FILENAME}"
          jq . "${JSON_FILENAME}"
          vulns="$(jq --compact-output . "${JSON_FILENAME}")"
          echo "vulns=${vulns}" >> $GITHUB_OUTPUT


  attest-no-snyk-vulns:
    if: ${{ needs.find-snyk-vulns.outputs.vulns == '[]' }}
    needs: [ setup, find-snyk-vulns ]
    runs-on: ubuntu-latest
    env:
      ATTESTATION_DATA_FILENAME: custom.json
      KOSLI_FLOW: "${{ inputs.kosli_flow }}"
      KOSLI_TRAIL: "${{ inputs.kosli_trail }}"
      FIRST_SEEN: "${{ needs.setup.outputs.trail_created_at }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Attest artifact to Kosli
        run:
          kosli attest artifact "${{ inputs.artifact_name }}"
            --fingerprint "${{ inputs.artifact_fingerprint }}"
            --name artifact

      - name: Create file containing custom attestation data
        run:
          jq
            --arg     id         none
            --arg     severity   none
            --arg     url        ''
            --arg     expires    '1970-01-01 00:00:00.000000+00:00'
            --argjson first_seen ${FIRST_SEEN}
            '$ARGS.named' <<< '{}' > "${ATTESTATION_DATA_FILENAME}"

      - name: Print custom attestation data
        run:
          cat "${ATTESTATION_DATA_FILENAME}"

      # - name: Attest custom to Kosli
      #   run:
      #     kosli attest custom "${{ inputs.artifact_name }}"
      #       --attestation-data "${ATTESTATION_DATA_FILENAME}"
      #       --fingerprint "${{ inputs.artifact_fingerprint }}"
      #       --name artifact.none
      #       --type "${{ inputs.kosli_cat }}"

      - name: Attest evidence to Kosli
        run: |
          echo ${{ inputs.artifact_name }}
          echo ${{ inputs.artifact_fingerprint }}
          echo ${{ inputs.repo_name }}
          echo ${{ inputs.git_commit }}
          echo ${{ inputs.commit_url }}
          echo ${{ inputs.raw_snyk_policy_url }}
          echo ${{ inputs.kosli_env }}
          echo ${{ inputs.kosli_flow }}
          echo ${FIRST_SEEN}


  attest-snyk-vulns:
    if: ${{ needs.find-snyk-vulns.outputs.vulns != '[]' }}
    needs: [ setup, find-snyk-vulns ]
    runs-on: ubuntu-latest
    env:
      ATTESTATION_DATA_FILENAME: custom.json
      KOSLI_FLOW: "${{ inputs.kosli_flow }}"
      KOSLI_TRAIL: "${{ inputs.kosli_trail }}"
      FIRST_SEEN: "${{ needs.setup.outputs.trail_created_at }}"
    strategy:
      matrix:
        include: ${{ fromJSON(needs.find-snyk-vulns.outputs.vulns) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Attest artifact to Kosli
        run:
          kosli attest artifact "${{ inputs.artifact_name }}"
            --fingerprint "${{ inputs.artifact_fingerprint }}"
            --name artifact

      - name: Create file containing custom attestation data
        run:
          jq
            --arg     id         "${{ matrix.snyk_id }}"
            --arg     severity   "${{ matrix.snyk_severity }}"
            --arg     url        "${{ matrix.snyk_url }}"
            --arg     expires    "${{ matrix.snyk_expires }}"
            --argjson first_seen ${FIRST_SEEN}
            '$ARGS.named' <<< '{}' > "${ATTESTATION_DATA_FILENAME}"

      - name: Print custom attestation data
        run:
          cat "${ATTESTATION_DATA_FILENAME}"

      # - name: Attest custom to Kosli
      #   run:
      #     kosli attest custom "${{ inputs.artifact_name }}"
      #       --attestation-data "${ATTESTATION_DATA_FILENAME}"
      #       --fingerprint "${{ inputs.artifact_fingerprint }}"
      #       --name "artifact.${{ matrix.snyk_id }}"
      #       --type "${{ inputs.kosli_cat }}"

      - name: Attest evidence to Kosli
        run: |
          echo ${{ inputs.artifact_name }}
          echo ${{ inputs.artifact_fingerprint }}
          echo ${{ inputs.repo_name }}
          echo ${{ inputs.git_commit }}
          echo ${{ inputs.commit_url }}
          echo ${{ inputs.raw_snyk_policy_url }}
          echo ${{ inputs.kosli_env }}
          echo ${{ inputs.kosli_flow }}
          echo ${{ matrix.snyk_id }}
          echo ${{ matrix.snyk_url }}
          echo ${{ matrix.snyk_severity }}
          echo ${{ matrix.snyk_expires }}
          echo ${FIRST_SEEN}
